type User @table {
  username: String!
  email: String!
  passwordHash: String!
  createdAt: Timestamp!
  displayName: String
  bio: String
  location: String
  contactInfo: String
  profilePictureUrl: String
  websiteUrl: String
}

type Media @table {
  mediaUrl: String!
  mediaType: String!
  createdAt: Timestamp!
  title: String
  description: String
  tags: [String]
  owner: User
}

type Event @table {
  title: String!
  eventDate: Timestamp!
  location: String!
  createdAt: Timestamp!
  description: String
  ticketPrice: Float
  eventPosterUrl: String
  organizer: User
}

type Connection @table(key: ["follower", "followed"]) {
  follower: User!
  followed: User!
  createdAt: Timestamp!
}

type Comment @table {
  content: String!
  createdAt: Timestamp!
  author: User
  onMedia: Media
  onEvent: Event
}